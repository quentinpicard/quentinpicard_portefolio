<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quentin Picard — Accueil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Archivo+Black&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="page-accueil">

  <!-- Fond décoratif grille -->
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="page-conteneur">

    <!-- ==============================
         COLONNE GAUCHE — Bio / intro
    ============================== -->
    <div class="col-gauche">

      <!-- Bloc Hero -->
      <div class="bloc-hero">
        <div class="hero-entete">
          <div class="liste-tags">
            <span class="tag tag--filled label">UX.UI</span>
            <span class="tag tag--filled label">IA WORKFLOW</span>
          </div>
          <h1 class="hero-title">Product Designer</h1>
        </div>
        <p class="hero-intro">
          <strong>Quentin Picard</strong>, designer UX/UI. Ma force&nbsp;: penser l'expérience et la créer.&nbsp;<span class="accent">Recherche, maquettes, design system, vibecoding et front-end</span>
        </p>
        <!-- Bouton Rive — À propos (canvas activé dans rive.js) -->
        <div class="btn-canvas-wrapper">
          <canvas id="btn-apropos" class="btn-canvas" width="252" height="62" aria-label="À propos"></canvas>
          <a href="profil.html" class="btn-canvas-link" aria-label="À propos"></a>
        </div>
      </div>

      <!-- Bloc Outils -->
      <div class="bloc-outils">
        <p class="meta">Outils</p>
        <div class="grille-outils">
          <div class="carte-outil">Figma</div>
          <div class="carte-outil">Rive</div>
          <div class="carte-outil">Claude</div>
          <div class="carte-outil">Suite Adobe</div>
        </div>
      </div>

      <!-- Réseaux sociaux — boutons Rive (icons_btn.riv) -->
      <div class="barre-socials">
        <div class="btn-canvas-wrapper btn-canvas-wrapper--social">
          <canvas id="btn-instagram" class="btn-social" width="48" height="48" data-icon="instagram"></canvas>
          <a href="#" class="btn-canvas-link" aria-label="Instagram" target="_blank" rel="noopener noreferrer"></a>
        </div>
        <div class="btn-canvas-wrapper btn-canvas-wrapper--social">
          <canvas id="btn-github" class="btn-social" width="48" height="48" data-icon="github"></canvas>
          <a href="#" class="btn-canvas-link" aria-label="GitHub" target="_blank" rel="noopener noreferrer"></a>
        </div>
        <!-- LinkedIn n'est pas présent dans icons_btn.riv, donc il est retiré ici -->
      </div>

    </div><!-- /col-gauche -->

    <!-- ==============================
         COLONNE DROITE — Bento projets
    ============================== -->
    <div class="col-droite">
      <div class="bento-projets" role="list" aria-label="Projets">

        <a class="card-project card-kit-ui"    href="#" role="listitem" aria-label="Kit UI Figma">
          <img src="img/kit ui.png" alt="Kit UI Figma">
        </a>
        <a class="card-project card-breasy"    href="#" role="listitem" aria-label="Breasy">
          <img src="img/Breasy.png" alt="Breasy">
        </a>
        <a class="card-project card-tara"      href="#" role="listitem" aria-label="Tara Polar Station">
          <img src="img/Tara Polar Station.png" alt="Tara Polar Station">
        </a>
        <a class="card-project card-growup"    href="#" role="listitem" aria-label="GrowUp">
          <img src="img/Growup.png" alt="GrowUp">
        </a>
        <a class="card-project card-peyinnov"  href="#" role="listitem" aria-label="Pey'innov">
          <img src="img/stratevie.png" alt="Pey'innov">
        </a>
        <a class="card-project card-premieres" href="#" role="listitem" aria-label="Les Premières">
          <img src="img/LPG.png" alt="Les Premières">
        </a>

      </div>
    </div><!-- /col-droite -->

  </main>

  <script src="https://unpkg.com/@rive-app/canvas@2.38.2/rive.js"></script>
  <script type="module" src="js/rive.js"></script>
  <!-- <script type="module" src="js/animations.js"></script> -->
  <!-- <script type="module" src="js/projects.js"></script> -->
</body>
</html>
