  <script src="js/transitions.js"></script>
  <div id="card-tooltip" class="card-tooltip" aria-hidden="true"></div>
  <script>
    (function () {
      const tip = document.getElementById('card-tooltip');
      document.querySelectorAll('.card-project').forEach(function (card) {
        card.addEventListener('mousemove', function (e) {
          tip.textContent = card.getAttribute('aria-label');
          tip.style.left = e.clientX + 'px';
          tip.style.top = e.clientY + 'px';
          tip.classList.add('is-visible');
        });
        card.addEventListener('mouseleave', function () {
          tip.classList.remove('is-visible');
        });
      });
    })();
  </script>
