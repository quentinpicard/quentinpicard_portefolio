<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Archivo+Black&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">

    .page-conteneur { outline: 3px solid green; }

<body class="page-accueil">

  <main class="page-conteneur">
    <div class="col-gauche">
      <div class="bloc-hero">
        <div class="hero-entete">
          <div class="liste-tags">
            <span class="tag tag--filled label">UX.UI</span>
            <span class="tag tag--filled label">IA WORKFLOW</span>
          </div>
          <h1 class="hero-title">Product Designer</h1>

      </div>
      <div class="bloc-outils">
        <p class="meta">Outils</p>
        <div class="grille-outils">
          <div class="carte-outil">Figma</div>
          <div class="carte-outil">Rive</div>
          <div class="carte-outil">Claude</div>
          <div class="carte-outil">Suite Adobe</div>

      </div>
